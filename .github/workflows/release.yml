name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build native app
        run: make mac

      - name: Package app archive
        run: ditto -c -k --sequesterRsrc --keepParent apps/macos/dist/BioLab.app "BioLab-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" "BioLab-${GITHUB_REF_NAME}.zip" \
            --title "BioLab ${GITHUB_REF_NAME}" \
            --notes "Automated native macOS release."
