# Bun install config (mirrors fw-sveltekit-template policy):
# exact pins, postinstall scripts blocked except trustedDependencies
# (see package.json), and a release-age gate against supply-chain attacks.
#
# Note: package.json "overrides" pins esrap to 2.2.11 — esrap 2.2.12+
# regresses TS optional-parameter stripping in svelte@5.56.x (leaves
# `param?` in emitted JS, breaking vite build). Re-test when bumping svelte.

[install]
exact = true

# 3-day minimum release age (in seconds) as a supply-chain gate.
minimumReleaseAge = 259200
